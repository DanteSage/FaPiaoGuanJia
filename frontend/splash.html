<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    var params = new URLSearchParams(window.location.search);
    var family = params.get('family') || 'dark';
    if (family === 'light') document.documentElement.classList.add('light');
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0f0c29;
      overflow: hidden;
    }
    html.light, html.light body {
      background: #f8f9fc;
    }
    .splash {
      width: 100%;
      height: 100%;
      background: #0f0c29;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    html.light .splash {
      background: #f8f9fc;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo {
      width: 100px; height: 100px;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }
    html.light .logo {
      background: rgba(0, 0, 0, 0.04);
      border-color: rgba(0, 0, 0, 0.1);
    }
    .logo svg {
      width: 56px; height: 56px;
      fill: white;
    }
    html.light .logo svg {
      fill: #1565c0;
    }
    .title {
      color: white;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      letter-spacing: 6px;
    }
    html.light .title {
      color: #1a237e;
    }
    .progress {
      width: 200px; height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    html.light .progress {
      background: rgba(0, 0, 0, 0.08);
    }
    .progress-bar {
      height: 100%;
      background: #667eea;
      border-radius: 2px;
      width: 0%;
    }
    html.splash-ready .progress-bar {
      animation: progressFill 2.5s ease-out forwards;
    }
    html.light .progress-bar {
      background: #1976d2;
    }
    @keyframes progressFill {
      0% { width: 0%; }
      20% { width: 20%; }
      50% { width: 60%; }
      80% { width: 85%; }
      100% { width: 100%; }
    }
    .hint {
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    html.light .hint {
      color: rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="content">
      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2ZM16 18H8V16H16V18ZM16 14H8V12H16V14ZM13 9V3.5L18.5 9H13Z"/>
        </svg>
      </div>
      <div class="title">发票管家</div>
      <div class="progress">
        <div class="progress-bar"></div>
      </div>
      <div class="hint">正在初始化...</div>
    </div>
  </div>
</body>
</html>

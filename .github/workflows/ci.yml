name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run coverage
      - run: npx playwright install chromium
      - run: npm run test:e2e

  frontend-compat:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
    defaults:
      run:
        shell: pwsh
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:unit
      - run: npx playwright install chromium
      - run: npm run test:e2e

  python:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: python-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            python-backend/requirements/base.txt
            python-backend/requirements/dev.txt
      - run: python -m pip install -r requirements/base.txt -r requirements/dev.txt
      - run: python -m black --check .
      - run: python -m flake8
      - run: python -m pytest --cov=src --cov-report=term-missing --cov-fail-under=60 tests/unit tests/integration

  java:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -f java/pom.xml verify
